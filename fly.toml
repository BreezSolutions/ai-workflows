app = 'ai-workflows'
primary_region = 'sjc'

[build]

[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["app"]
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[processes]
  app = 'node dist/index.js'

[env]
  NODE_ENV = 'production'

[mounts]
  source = 'claude_sessions'
  destination = '/root/.claude'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '4gb'
  cpus = 2
